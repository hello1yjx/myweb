<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>联系 | Lumen Forge</title>
  <meta name="description" content="联系站点作者，洽谈合作、交流建站和内容相关话题。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="page-shell site-header__inner">
      <a class="brand" href="index.html" aria-label="返回首页">
        <span class="brand-mark">LF</span>
        <span class="brand-copy">
          <strong data-site-name></strong>
          <span data-site-tagline></span>
        </span>
      </a>
      <button class="menu-button" data-menu-button aria-expanded="false" aria-label="切换导航菜单">☰</button>
      <nav class="site-nav" data-mobile-nav>
        <a href="index.html">首页</a>
        <a href="posts.html">文章</a>
        <a href="resources.html">资源推荐</a>
        <a href="projects.html">项目展示</a>
        <a href="about.html">关于</a>
        <a href="contact.html">联系</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="page-hero">
      <div class="page-hero__panel reveal">
        <p class="eyebrow">Contact</p>
        <h1>欢迎交流建站、内容合作和资源推荐。</h1>
        <p>如果你以后想把这个站真正用于合作或接单，这一页就是很重要的转化入口。</p>
      </div>
    </section>

    <section class="section contact-grid">
      <article class="contact-card reveal">
        <p class="label">直接联系</p>
        <h3>先用轻量方式开始就够了。</h3>
        <p>GitHub Pages 没有后端也没关系，可以先放邮箱、GitHub、社交账号；后续再接 Formspree 等第三方表单服务。</p>
        <p><strong>邮箱：</strong><a data-site-email href="#"></a></p>
        <p><strong>GitHub：</strong><a data-site-github href="#" target="_blank" rel="noreferrer">查看主页</a></p>
      </article>

      <article class="form-card reveal">
        <p class="label">表单占位</p>
        <h3>后续可接第三方服务</h3>
        <form class="contact-form">
          <input type="text" placeholder="你的名字">
          <input type="email" placeholder="你的邮箱">
          <textarea placeholder="想交流什么内容？"></textarea>
          <button class="button button--primary" type="button">提交占位</button>
        </form>
      </article>
    </section>
  </main>

  <footer class="footer">
    <div class="page-shell footer__inner">
      <div>
        <strong data-site-name></strong>
        <p data-site-tagline></p>
      </div>
      <div>
        <a data-site-email href="#"></a><br>
        <a data-site-github href="#" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
