<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>你的名字 | 个人主页</title>
  <meta name="description" content="用一句话说明你的个人主页提供什么内容。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top">你的名字</a>
    <button class="menu-button" type="button" aria-expanded="false" aria-controls="site-nav">菜单</button>
    <nav id="site-nav" class="site-nav" aria-label="主要导航">
      <a href="#about">关于我</a>
      <a href="#projects">项目</a>
      <a href="#contact">联系</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <p class="eyebrow">你好，我是你的名字</p>
      <h1>用一句清楚的话说明你能解决什么问题。</h1>
      <p>这里写你的方向、经验和当前正在做的事情。不要保留示例文案。</p>
      <a class="button" href="#projects">查看项目</a>
    </section>

    <section id="about" class="section">
      <h2>关于我</h2>
      <p>写一段真实、简短的介绍，并告诉访客接下来可以看什么。</p>
    </section>

    <section id="projects" class="section">
      <h2>精选项目</h2>
      <div class="project-grid">
        <article class="card">
          <p class="eyebrow">项目类型</p>
          <h3>项目名称</h3>
          <p>说明项目解决的问题、你负责的部分和最终结果。</p>
          <a href="#">查看项目</a>
        </article>
        <article class="card">
          <p class="eyebrow">项目类型</p>
          <h3>项目名称</h3>
          <p>使用真实内容替换这个示例，并删除不需要的卡片。</p>
          <a href="#">查看项目</a>
        </article>
      </div>
    </section>

    <section id="contact" class="section">
      <h2>联系我</h2>
      <p>邮箱：your-email@example.com</p>
    </section>
  </main>

  <footer>
    <p>© <span data-year></span> 你的名字</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
